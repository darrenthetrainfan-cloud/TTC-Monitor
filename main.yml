name: Run TTC Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 必须开启写入权限，否则无法存回 seen_ids.txt
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests gtfs-realtime-bindings

      - name: Run script
        run: python "TTC alart.py"

      - name: Commit and push changes
        run: |
          git config --global user.name "TTC-Bot"
          git config --global user.email "bot@github.com"
          git add seen_ids.txt || exit 0
          git commit -m "Update seen alerts" || exit 0
          git push
