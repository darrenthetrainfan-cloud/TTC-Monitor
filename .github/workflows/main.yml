name: Transit Tracker Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install requests gtfs-realtime-bindings

      - name: Run
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python "TTC alart.py"

      - name: Sync Repo
        run: |
          git config --global user.name "Transit-Bot"
          git config --global user.email "bot@github.com"
          git add seen_ids.txt || exit 0
          git commit -m "chore: update alert database" || echo "No changes"
          # 关键：先 pull 再 push，确保不会因 seen_ids.txt 冲突
          git pull --rebase origin main
          git push origin main
