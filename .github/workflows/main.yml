name: Run Transit Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests gtfs-realtime-bindings

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TRANSLINK_API_KEY: ${{ secrets.TRANSLINK_API_KEY }} 
        run: python "TTC alart.py"

      - name: Commit and push changes
        run: |
          git config --global user.name "Transit-Bot"
          git config --global user.email "bot@github.com"
          
          # 鲁棒性改进：拉取最新更改，即使有本地修改也强制 rebase
          git add seen_ids.txt || exit 0
          git commit -m "Update seen alerts" || echo "No changes"
          
          # 针对 image_3877c3.png 的报错修复：使用 fetch + rebase
          git fetch origin main
          git rebase origin/main
          git push origin main
