name: Run TTC and GO Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以方便 rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests gtfs-realtime-bindings

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python "TTC alart.py"

      - name: Commit and push changes
        run: |
          git config --global user.name "Transit-Bot"
          git config --global user.email "bot@github.com"
          
          # 先暂存修改
          git add seen_ids.txt || exit 0
          git commit -m "Update seen alerts" || echo "No changes to commit"
          
          # 针对 image_3877c3.png 报错的终极修复：
          # 即使有冲突，也会尝试拉取并重新排在最新提交之后
          git pull --rebase origin main
          git push origin main
