name: Transit Tracker Bot

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '*/5 * * * *' # 每 5 分钟运行一次

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启，否则无法更新 seen_ids.txt

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以确保 rebase 成功

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests gtfs-realtime-bindings beautifulsoup4
          # beautifulsoup4 用于处理 GO Transit 的 HTML 备选方案

      - name: Run Transit Script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python "TTC alart.py"

      - name: Sync and Push Changes
        run: |
          git config --global user.name "Transit-Bot"
          git config --global user.email "bot@github.com"
          
          # 检查是否有文件更新
          git add seen_ids.txt || exit 0
          
          # 如果有更新则提交，没有则跳过
          if git commit -m "chore: update alert database"; then
            # 关键修复：先拉取并重排提交顺序，防止 image_3877c3.png 中的冲突报错
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to seen_ids.txt, skipping push."
          fi
