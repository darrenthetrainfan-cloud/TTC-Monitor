name: Transit Tracker Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests gtfs-realtime-bindings beautifulsoup4

      - name: Run Script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python "TTC alart.py"

      - name: Sync and Push
        run: |
          git config --global user.name "Transit-Bot"
          git config --global user.email "bot@github.com"
          git add seen_ids.txt || exit 0
          if git commit -m "update database"; then
            git pull --rebase origin main
            git push origin main
          fi
