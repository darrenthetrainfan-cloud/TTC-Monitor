name: Run TTC Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # 这一行可以直接让警告消失
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到 v4
      
      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'
# ... 后面保持不变 ...
      - name: Install dependencies
        run: pip install requests gtfs-realtime-bindings

      - name: Run script
        run: python "TTC alart.py"

      - name: Commit and push changes
        run: |
          git config --global user.name "TTC-Bot"
          git config --global user.email "bot@github.com"
          git add seen_ids.txt || exit 0
          git commit -m "Update seen alerts" || exit 0
          git push
