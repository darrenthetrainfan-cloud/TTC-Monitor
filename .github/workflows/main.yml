name: Transit Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install requests gtfs-realtime-bindings beautifulsoup4

      - name: Run
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python "TTC alart.py"

      - name: Push Changes
        run: |
          git config --global user.name "Transit-Bot"
          git config --global user.email "bot@github.com"
          git add seen_ids.txt || exit 0
          
          # 针对 image_3877c3.png 的核心修复：先 commit 再 pull --rebase
          if git commit -m "update seen alerts"; then
            git pull --rebase origin main
            git push origin main
          fi
